<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPS Electrical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  background: #2563eb;
  padding: 20px;
  text-align: center;
}

.hero {
  text-align: center;
  padding: 50px 20px;
  background: #111827;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1f2937;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #2563eb;
}

.status {
  text-align: center;
  margin-top: 10px;
}
</style>

</head>

<body>

<header>
  <h1>SPS Electrical</h1>
</header>

<div class="hero">
  <h2>Reliable Electrical Services</h2>
  <p>Fast • Safe • Professional</p>
</div>

<div class="container">

  <div class="card">
    <h2>Services</h2>
    <ul>
      <li>House Rewiring</li>
      <li>Lighting Installation</li>
      <li>Fuse Board Upgrades</li>
      <li>Fault Finding</li>
    </ul>
  </div>

  <div class="card">
    <h2>Request a Quote</h2>

    <form id="quoteForm">
      <input name="name" placeholder="Name" required>
      <input name="email" placeholder="Email" required>
      <textarea name="message" placeholder="Job details..." required></textarea>

      <button type="submit">Send Quote</button>
      <div class="status" id="status"></div>
    </form>

  </div>

</div>

<script>
const form = document.getElementById("quoteForm");
const status = document.getElementById("status");
const button = form.querySelector("button");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  status.textContent = "Sending...";
  button.disabled = true;

  const data = {
    name: form.name.value,
    email: form.email.value,
    message: form.message.value
  };

  try {
    const res = await fetch("/send-quote", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.success) {
      status.textContent = "✅ Sent successfully!";
      form.reset();
    } else {
      status.textContent = "❌ Failed: " + json.error;
    }

  } catch (err) {
    status.textContent = "❌ Server error";
  }

  button.disabled = false;
});
</script>

</body>
</html>
