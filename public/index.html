<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #070b14;
      color: white;
    }

    header {
      padding: 70px 20px;
      text-align: center;
      background: linear-gradient(135deg, #1e3a8a, #0b1220);
    }

    h1 { margin: 0; font-size: 48px; }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 10px;
    }

    #adminPanel {
      display: none;
    }

    #loginBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    #loginInner {
      width: 300px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    #adminBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #facc15;
      padding: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<button id="adminBtn" onclick="openLogin()">Admin Login</button>

<header>
  <h1>SPS Electrical</h1>
  <p>Reliable Electrical Services</p>
</header>

<div class="container">

  <div class="card">
    <h2>Services</h2>
    <p>House Wiring, Lighting, Fault Finding, Repairs</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <input placeholder="Name">
    <input placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
  </div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="container">
  <div class="card">
    <h2>Admin Panel</h2>
    <p>Welcome Paul 👋</p>
    <p>This is your admin area.</p>
  </div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div id="loginInner">
    <h3>Admin Login</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<script>

function openLogin() {
  loginBox.style.display = "flex";
}

function login() {
  if (user.value === "paul" && pass.value === "admin") {
    loginBox.style.display = "none";
    adminPanel.style.display = "block";
    msg.innerText = "";
  } else {
    msg.innerText = "Wrong login ❌";
  }
}

</script>

</body>
</html>
