<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPS Electrical</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
    section {
      padding: 20px;
    }
    .services {
      background: white;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 8px;
    }
    form {
      background: white;
      padding: 15px;
      border-radius: 8px;
    }
    input, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
    }
    button {
      background: #222;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>SPS Electrical</h1>
  <p>Reliable Electrical Services</p>
</header>

<section class="services">
  <h2>Services</h2>
  <ul>
    <li>Full House Rewiring</li>
    <li>Lighting Installation</li>
    <li>Fuse Board Upgrades</li>
    <li>Fault Finding</li>
    <li>Socket Installations</li>
  </ul>
</section>

<section>
  <h2>Request a Quote</h2>
  <form id="quoteForm">
    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <textarea name="message" placeholder="Describe the job..." required></textarea>
    <button type="submit">Send Quote</button>
  </form>
</section>

<script>
  const form = document.getElementById('quoteForm');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
      name: form.name.value,
      email: form.email.value,
      message: form.message.value
    };

    const res = await fetch('/send-quote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      alert('Quote sent successfully!');
      form.reset();
    } else {
      alert('Error sending quote.');
    }
  });
</script>

</body>
</html>
