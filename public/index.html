<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: radial-gradient(circle at top left, #1e3a8a, #020617);
    }

    /* ADMIN BUTTON */
    #adminBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #facc15, #f59e0b);
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: black;
    }

    /* HEADER */
    header {
      padding: 80px 60px 40px;
    }

    .title {
      font-size: 64px;
      font-weight: bold;
    }

    .title span {
      color: #22d3ee;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 20px;
      color: #ccc;
    }

    /* CONTAINER */
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    /* CARD STYLE */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 30px;
      margin: 25px 0;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h2 {
      margin-top: 0;
      font-size: 28px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: white;
      font-size: 16px;
    }

    input::placeholder, textarea::placeholder {
      color: #aaa;
    }

    button {
      display: block;
      margin: 20px auto 0;
      padding: 12px 30px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    /* LOGIN */
    #loginBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    #loginInner {
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
    }

    /* ADMIN PANEL */
    #adminPanel {
      display: none;
      padding: 20px;
    }

    .msg {
      background: #1e293b;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<button id="adminBtn" onclick="openLogin()">Admin Login</button>

<header>
  <div class="title"><span>Sps</span> Electrical</div>
  <div class="subtitle">Electrical • Est 1989</div>
</header>

<div class="container">

  <!-- QUOTE -->
  <div class="card">
    <h2>Get a Quote</h2>

    <input id="qname" placeholder="Name">
    <input id="qemail" placeholder="Email">
    <input id="qphone" placeholder="Phone">
    <input id="qaddress" placeholder="Full Address">
    <textarea id="qmsg" placeholder="Message"></textarea>

    <button onclick="sendQuote()">Send Quote</button>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h2>Live Chat</h2>

    <input id="cname" placeholder="Name">
    <textarea id="cmsg" placeholder="Message"></textarea>

    <button onclick="sendChat()">Send</button>
  </div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="container">
  <div class="card">
    <h2>Admin Panel</h2>
    <button onclick="loadData()">Refresh</button>
    <div id="output"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div id="loginInner">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>

/* LOGIN */
function openLogin() {
  loginBox.style.display = "flex";
}

function login() {
  if (user.value === "paul" && pass.value === "admin") {
    loginBox.style.display = "none";
    adminPanel.style.display = "block";
    loadData();
  }
}

/* QUOTE */
async function sendQuote() {
  await fetch("/send-quote", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: qname.value,
      email: qemail.value,
      phone: qphone.value,
      address: qaddress.value,
      message: qmsg.value
    })
  });

  alert("Quote sent ✔");
}

/* CHAT */
async function sendChat() {
  await fetch("/send-message", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: cname.value,
      message: cmsg.value
    })
  });

  alert("Message sent ✔");
}

/* ADMIN */
async function loadData() {
  const res = await fetch("/data");
  const data = await res.json();

  let html = "<h3>Chats</h3>";

  for (let user in data.chats) {
    html += `<h4>${user}</h4>`;
    data.chats[user].forEach(m => {
      html += `<div class="msg"><b>${m.sender}:</b> ${m.message}</div>`;
    });
  }

  html += "<h3>Quotes</h3>";

  data.quotes.forEach(q => {
    html += `
      <div class="msg">
        <b>${q.name}</b><br>
        ${q.email}<br>
        ${q.phone}<br>
        ${q.address}<br>
        ${q.message}
      </div>
    `;
  });

  output.innerHTML = html;
}

</script>

</body>
</html>
