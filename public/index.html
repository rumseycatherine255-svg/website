<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPS Electrical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0f1c;
  color:white;
}

header {
  background:#2563eb;
  padding:20px;
  text-align:center;
}

.hero {
  padding:70px 20px;
  text-align:center;
  background: linear-gradient(180deg,#1d4ed8,#0a0f1c);
}

.hero h1 {
  font-size:40px;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card {
  background:#1f2937;
  padding:20px;
  border-radius:12px;
}

form {
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#0b1220;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#16a34a;
}

.status {
  text-align:center;
  margin-top:10px;
}

.floating {
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.floating a {
  padding:12px;
  border-radius:50px;
  text-decoration:none;
  color:white;
  text-align:center;
  font-weight:bold;
}

.call {background:#f59e0b;}
.wa {background:#22c55e;}

footer {
  text-align:center;
  padding:20px;
  opacity:0.5;
}
</style>

</head>

<body>

<header>
  <h2>SPS Electrical</h2>
</header>

<section class="hero">
  <h1>Reliable Local Electrician</h1>
  <p>Fast • Safe • Affordable</p>
</section>

<div class="container">

<h2>Services</h2>

<div class="grid">
  <div class="card">Rewiring</div>
  <div class="card">Lighting Installations</div>
  <div class="card">Fuse Board Upgrades</div>
  <div class="card">Fault Finding</div>
</div>

<h2 style="margin-top:30px;">Get a Quote</h2>

<form id="quoteForm">
  <input name="name" placeholder="Your Name" required>
  <input name="email" placeholder="Your Email" required>
  <input name="phone" placeholder="Your Phone Number" required>
  <textarea name="message" placeholder="Job details..." required></textarea>
  <button type="submit">Send Quote</button>
  <div class="status" id="status"></div>
</form>

</div>

<div class="floating">
  <a class="call" href="tel:+440000000000">📞 Call</a>
  <a class="wa" href="https://wa.me/440000000000">💬 WhatsApp</a>
</div>

<footer>
  © 2026 SPS Electrical
</footer>

<script>
const form = document.getElementById("quoteForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  status.textContent = "Sending...";

  const data = {
    name: form.name.value,
    email: form.email.value,
    phone: form.phone.value,
    message: form.message.value
  };

  try {
    const res = await fetch("/send-quote", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.success) {
      status.textContent = "✅ Sent successfully!";
      form.reset();
    } else {
      status.textContent = "❌ Failed: " + json.error;
    }

  } catch (err) {
    status.textContent = "❌ Server error";
  }
});
</script>

</body>
</html>
