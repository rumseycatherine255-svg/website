<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
    }

    header {
      padding: 70px 20px;
      text-align: center;
      background: linear-gradient(135deg, #facc15, #1e3a8a);
    }

    h1 { font-size: 42px; }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .service {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #facc15;
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: #eab308;
    }
  </style>
</head>

<body>

<header>
  <h1>SPS Electrical</h1>
  <p>Reliable Domestic & Commercial Electrical Services</p>
</header>

<div class="container">

  <div class="card">
    <h2>Our Services</h2>
    <div class="services">
      <div class="service">⚡ House Wiring</div>
      <div class="service">💡 Lighting Installation</div>
      <div class="service">🔌 Socket Repairs</div>
      <div class="service">🧰 Fault Finding</div>
    </div>
  </div>

  <div class="card">
    <h2>Get a Free Quote</h2>

    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone Number">
    <textarea id="message" placeholder="What do you need done?"></textarea>

    <button onclick="send()">Send Quote</button>

    <p id="status"></p>
  </div>

</div>

<script>
async function send() {
  const res = await fetch('/send-quote', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      phone: phone.value,
      message: message.value
    })
  });

  const data = await res.json();

  status.innerText = data.success
    ? "⚡ Quote sent successfully!"
    : "❌ Failed: " + data.error;
}
</script>

</body>
</html>
