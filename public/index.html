<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: linear-gradient(135deg, #1e3a8a, #0b1220);
    }

    h1 { font-size: 42px; margin: 0; }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #0ea5e9;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0284c7;
    }

    #adminPanel {
      display: none;
    }

    #loginBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    #loginInner {
      width: 300px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    #adminBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      background: gold;
      color: black;
      padding: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<button id="adminBtn" onclick="openLogin()">Admin Login</button>

<header>
  <h1>SPS Electrical</h1>
  <p>Reliable Electrical Services</p>
</header>

<div class="container">

  <!-- SERVICES -->
  <div class="card">
    <h2>Services</h2>
    <p>House Wiring, Fault Finding, Lighting, Repairs</p>
  </div>

  <!-- QUOTE -->
  <div class="card">
    <h2>Get a Quote</h2>

    <input id="qname" placeholder="Name">
    <input id="qemail" placeholder="Email">
    <input id="qphone" placeholder="Phone">
    <textarea id="qmsg" placeholder="Message"></textarea>

    <button onclick="sendQuote()">Send Quote</button>
    <p id="qstatus"></p>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h2>Live Chat</h2>

    <input id="cname" placeholder="Your Name">
    <textarea id="cmsg" placeholder="Message"></textarea>

    <button onclick="sendChat()">Send Message</button>
    <p id="cstatus"></p>
  </div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="container">
  <div class="card">
    <h2>Admin Panel</h2>
    <p>Welcome Paul 👋</p>
    <p>This is your dashboard.</p>
  </div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div id="loginInner">
    <h3>Admin Login</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<script>

/* ---------------- LOGIN ---------------- */
function openLogin() {
  loginBox.style.display = "flex";
}

function login() {
  if (user.value === "paul" && pass.value === "admin") {
    loginBox.style.display = "none";
    adminPanel.style.display = "block";
    msg.innerText = "";
  } else {
    msg.innerText = "Wrong login ❌";
  }
}

/* ---------------- QUOTE ---------------- */
async function sendQuote() {
  const res = await fetch('/send-quote', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name: qname.value,
      email: qemail.value,
      phone: qphone.value,
      message: qmsg.value
    })
  });

  const data = await res.json();
  qstatus.innerText = data.success ? "Sent ✔" : "Failed ❌";
}

/* ---------------- CHAT ---------------- */
async function sendChat() {
  const res = await fetch('/send-message', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name: cname.value,
      message: cmsg.value
    })
  });

  const data = await res.json();
  cstatus.innerText = data.success ? "Sent ✔" : "Failed ❌";
}

</script>

</body>
</html>
