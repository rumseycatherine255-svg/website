<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPS Electrical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #2563eb;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 10px 0;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #2563eb;
}

.status {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h1>SPS Electrical</h1>
  <p>Reliable Electrical Services</p>
</header>

<div class="container">

  <div class="card">
    <h2>Services</h2>
    <ul>
      <li>Rewiring</li>
      <li>Lighting</li>
      <li>Fuse Board Upgrades</li>
      <li>Fault Finding</li>
    </ul>
  </div>

  <div class="card">
    <h2>Request a Quote</h2>

    <form id="quoteForm">
      <input name="name" placeholder="Your Name" required>
      <input name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Describe the job..." required></textarea>

      <button type="submit">Send Quote</button>
      <div class="status" id="status"></div>
    </form>
  </div>

</div>

<script>
const form = document.getElementById("quoteForm");
const status = document.getElementById("status");
const button = form.querySelector("button");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  status.textContent = "Sending...";
  button.disabled = true;

  const data = {
    name: form.name.value,
    email: form.email.value,
    message: form.message.value
  };

  try {
    const res = await fetch("/send-quote", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      status.textContent = "✅ Sent successfully!";
      form.reset();
    } else {
      status.textContent = "❌ Failed to send.";
    }

  } catch (err) {
    status.textContent = "❌ Server error.";
  }

  button.disabled = false;
});
</script>

</body>
</html>
