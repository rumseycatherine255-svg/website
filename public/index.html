<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 12px 18px;
      background: #020617;
      z-index: 1000;
    }

    .brand { color: #38bdf8; font-weight: bold; }

    .topBtns button {
      margin-left: 6px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .aiBtn { background: #38bdf8; color: black; }
    .adminBtn { background: gold; }

    /* PAGES */
    .page { display: none; padding-top: 80px; }
    .active { display: block; }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .section {
      background: #111827;
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: white;
    }

    button.full {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    /* CHAT UI */
    .chat { max-width: 800px; margin: auto; padding: 20px; }

    .msg {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user { background: #38bdf8; color: black; margin-left: auto; }
    .ai { background: #1e293b; }

    .inputBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #020617;
    }

    .inputBox input { flex: 1; }

    .inputBox button {
      padding: 12px;
      background: #38bdf8;
      border: none;
      margin-left: 6px;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">SPS Electrical</div>
  <div class="topBtns">
    <button class="aiBtn" onclick="showPage('ai')">AI</button>
    <button class="adminBtn">🔐</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="container">

    <div class="section">
      <h2>About SPS Electrical</h2>
      <p>Run by Paul, a certified electrician with years of experience in domestic electrical work.</p>
      <p>All work is carried out personally to ensure consistent quality and safety.</p>
    </div>

    <!-- LIVE CHAT -->
    <div class="section">
      <h2>Live Chat</h2>
      <input id="cname" placeholder="Name">
      <textarea id="cmsg" placeholder="Message"></textarea>
      <button class="full" onclick="sendChat()">Send Message</button>
    </div>

  </div>
</div>

<!-- AI PAGE -->
<div id="ai" class="page">
  <div class="chat" id="chat"></div>

  <div class="inputBox">
    <input id="input" placeholder="Ask about electrics...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

/* NAVIGATION */
function showPage(p) {
  document.querySelectorAll(".page").forEach(x => x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* ===================== */
/* 🔌 LIVE CHAT SYSTEM */
/* ===================== */
async function sendChat() {
  await fetch("/send-message", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("cname").value,
      message: document.getElementById("cmsg").value
    })
  });

  alert("Message sent ✔");
}

/* ===================== */
/* 🤖 AI CHAT SYSTEM */
/* ===================== */

let context = "";

function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  setTimeout(() => {
    addMsg(ai(text.toLowerCase()), "ai");
  }, 300);
}

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  div.scrollIntoView();
}

function ai(q) {

  /* GREETING */
  if (/^(hi|hello|hey)/.test(q)) return "Hi — what do you need help with?";

  /* MEMORY */
  if (q.includes("light")) context = "lighting";
  if (q.includes("socket")) context = "socket";

  /* FOLLOW UPS */
  if (q.includes("which")) {
    if (context === "lighting") return "LED downlights are usually the best choice.";
    if (context === "socket") return "Double sockets or USB sockets are most common.";
  }

  /* HELP */
  if (q.includes("light")) return "LED lighting is the best option for most homes.";
  if (q.includes("socket")) return "Standard double sockets are most common.";
  if (q.includes("tripping")) return "Tripping usually means a fault or overload.";
  if (q.includes("flicker")) return "Flickering lights often mean loose connections.";

  /* DEFAULT */
  return "If you can describe the issue a bit more, I can guide you better.";
}

</script>

</body>
</html>
