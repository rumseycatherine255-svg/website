<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical Chat</title>
  <style>
    body { font-family: Arial; background:#0a0f1c; color:white; }

    .box {
      width:300px;
      position:fixed;
      bottom:20px;
      right:20px;
      background:#111827;
      padding:10px;
      border-radius:10px;
    }

    input, textarea {
      width:100%;
      margin:5px 0;
      padding:8px;
    }

    button {
      width:100%;
      padding:8px;
      background:gold;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">SPS Electrical</h2>

<div class="box">
  <h4>💬 Chat</h4>

  <input id="name" placeholder="Your name">
  <textarea id="msg" placeholder="Message"></textarea>

  <button onclick="send()">Send</button>

  <p id="status"></p>
</div>

<script>
async function send() {
  const res = await fetch('/send-message', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name: name.value,
      message: msg.value
    })
  });

  const data = await res.json();

  status.innerText = data.success ? "Sent ✔" : "Failed ❌";
}
</script>

</body>
</html>
