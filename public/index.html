<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1e3a8a, #020617);
      color: white;
    }

    /* TOP BUTTONS */
    #topBtns {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
      z-index: 1000;
    }

    #adminBtn, #aiBtn, #aiPageBtn {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
    }

    #adminBtn {
      background: linear-gradient(135deg, gold, orange);
    }

    #aiBtn {
      background: linear-gradient(135deg, #22d3ee, #0284c7);
      color: white;
    }

    #aiPageBtn {
      background: linear-gradient(135deg, #34d399, #059669);
      color: white;
    }

    header {
      text-align: center;
      padding: 70px 20px 30px;
    }

    .title {
      font-size: 48px;
      color: #22d3ee;
    }

    .subtitle {
      color: #ccc;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 15px;
    }

    .card {
      background: rgba(17, 24, 39, 0.7);
      padding: 25px;
      margin: 25px 0;
      border-radius: 16px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #0ea5e9;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    #chatBox {
      max-height: 200px;
      overflow-y: auto;
    }

    .msg {
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
    }

    .user { background: #1e293b; }
    .ai { background: #0ea5e9; }

    #loginBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    #adminPanel { display: none; }

    /* FULL AI PAGE */
    #aiPage {
      display: none;
      position: fixed;
      inset: 0;
      background: #020617;
      z-index: 2000;
      flex-direction: column;
    }
  </style>
</head>

<body>

<!-- TOP BUTTONS -->
<div id="topBtns">
  <button id="aiPageBtn" onclick="openAIPage()">💬</button>
  <button id="aiBtn" onclick="toggleAI()">🤖</button>
  <button id="adminBtn" onclick="openLogin()">🔐</button>
</div>

<header>
  <div class="title">Sps Electrical</div>
  <div class="subtitle">Electrical • Est 1989</div>
</header>

<div class="container">

  <!-- QUOTE -->
  <div class="card">
    <h2>Get a Quote</h2>
    <input id="qname" placeholder="Name">
    <input id="qemail" placeholder="Email">
    <input id="qphone" placeholder="Phone">
    <input id="qaddress" placeholder="Full Address">
    <textarea id="qmsg" placeholder="Message"></textarea>
    <button onclick="sendQuote()">Send Quote</button>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h2>Live Chat</h2>

    <div id="chatBox"></div>

    <input id="cname" placeholder="Name">
    <textarea id="cmsg" placeholder="Message"></textarea>
    <button onclick="sendChat()">Send</button>
  </div>

</div>

<!-- ADMIN -->
<div id="adminPanel" class="container">
  <div class="card">
    <h2>Admin Panel</h2>
    <button onclick="loadData()">Refresh</button>
    <div id="output"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div style="background:#111827;padding:20px;border-radius:10px;">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- FULL AI PAGE -->
<div id="aiPage">

  <div style="padding:15px;background:#0f172a;display:flex;justify-content:space-between;">
    <b>AI Assistant</b>
    <button onclick="closeAIPage()">✖</button>
  </div>

  <div id="aiChatBox" style="flex:1;overflow-y:auto;padding:15px;"></div>

  <div style="padding:15px;background:#0f172a;">
    <textarea id="aiInput" placeholder="Ask anything..."></textarea>
    <button onclick="sendAIMessage()">Send</button>
  </div>

</div>

<script>

let aiEnabled = true;
let aiChat = [];

/* AI TOGGLE */
function toggleAI() {
  aiEnabled = !aiEnabled;
  aiBtn.style.opacity = aiEnabled ? "1" : "0.4";
  alert(aiEnabled ? "AI Enabled 🤖" : "AI Disabled ❌");
}

/* AI PAGE */
function openAIPage() {
  aiPage.style.display = "flex";
}

function closeAIPage() {
  aiPage.style.display = "none";
}

/* AI CHAT PAGE */
function sendAIMessage() {
  const text = aiInput.value;
  if (!text) return;

  aiChat.push({ sender: "You", text });

  let reply = "I'm here to help with electrical questions.";

  const msg = text.toLowerCase();

  if (msg.includes("price")) {
    reply = "Prices vary. Please use the quote form above.";
  } else if (msg.includes("socket")) {
    reply = "We install sockets 👍 Send a quote request.";
  } else if (msg.includes("rewire")) {
    reply = "Rewires require inspection. Request a quote.";
  } else if (msg.includes("hi")) {
    reply = "Hi 👋 How can I help?";
  }

  aiChat.push({ sender: "AI", text: reply });

  renderAIChat();
  aiInput.value = "";
}

function renderAIChat() {
  let html = "";

  aiChat.forEach(m => {
    html += `
      <div style="margin:8px 0;padding:10px;border-radius:8px;
      background:${m.sender === "AI" ? "#0ea5e9" : "#1e293b"}">
        <b>${m.sender}:</b> ${m.text}
      </div>`;
  });

  aiChatBox.innerHTML = html;
  aiChatBox.scrollTop = aiChatBox.scrollHeight;
}

/* LOGIN */
function openLogin() {
  loginBox.style.display = "flex";
}

function login() {
  if (user.value === "paul" && pass.value === "admin") {
    loginBox.style.display = "none";
    adminPanel.style.display = "block";
    loadData();
  }
}

/* QUOTE */
async function sendQuote() {
  const res = await fetch("/send-quote", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: qname.value,
      email: qemail.value,
      phone: qphone.value,
      address: qaddress.value,
      message: qmsg.value
    })
  });

  const data = await res.json();
  alert(data.success ? "Quote sent ✔" : "Error");
}

/* CHAT */
async function sendChat() {
  const name = cname.value;

  await fetch("/send-message", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name,
      message: cmsg.value,
      ai: aiEnabled
    })
  });

  loadChat(name);
  cmsg.value = "";
}

async function loadChat(name) {
  const res = await fetch("/data");
  const data = await res.json();

  let html = "";

  (data.chats[name] || []).forEach(m => {
    html += `<div class="msg ${m.sender === "AI" ? "ai" : "user"}">
      <b>${m.sender}:</b> ${m.message}
    </div>`;
  });

  chatBox.innerHTML = html;
}

/* ADMIN */
async function loadData() {
  const res = await fetch("/data");
  const data = await res.json();

  let html = "<h3>Chats</h3>";

  for (let u in data.chats) {
    html += `<h4>${u}</h4>`;
    data.chats[u].forEach(m => {
      html += `<div class="msg"><b>${m.sender}:</b> ${m.message}</div>`;
    });
  }

  html += "<h3>Quotes</h3>";

  data.quotes.forEach(q => {
    html += `<div class="msg">
      <b>${q.name}</b><br>
      ${q.email}<br>
      ${q.phone}<br>
      ${q.address}<br>
      ${q.message}
    </div>`;
  });

  output.innerHTML = html;
}

</script>

</body>
</html>
