<!DOCTYPE html>
<html>
<head>
  <title>SPS Electrical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1e3a8a, #020617);
      color: white;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 70px 20px 30px;
      justify-content: center;
      text-align: center;
      flex-wrap: wrap;
    }

    header img {
      height: 90px;
    }

    .title {
      font-size: 50px;
      font-weight: bold;
      color: #22d3ee;
    }

    .subtitle {
      color: #ccc;
      font-size: 18px;
    }

    /* 🔥 ULTRA SMALL ADMIN BUTTON */
    #adminBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, gold, orange);
      border: none;
      cursor: pointer;
      font-size: 14px;
      z-index: 1000;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CONTAINER */
    .container {
      max-width: 900px;
      margin: auto;
      padding: 15px;
    }

    /* CARDS */
    .card {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      padding: 25px;
      margin: 25px 0;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h2 { margin-top: 0; }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: white;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    /* EXAMPLES */
    .examples-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 10px;
    }

    .example-box {
      height: 140px;
      background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 14px;
    }

    /* LOGIN */
    #loginBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    #loginInner {
      width: 300px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    #adminPanel { display: none; }

    .msg {
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      background: #1e293b;
      word-break: break-word;
    }

    /* 📱 MOBILE */
    @media (max-width: 600px) {

      header {
        padding: 85px 10px 20px;
      }

      .title {
        font-size: 34px;
      }

      .subtitle {
        font-size: 14px;
      }

      header img {
        height: 70px;
      }

      /* EVEN SMALLER ADMIN BUTTON */
      #adminBtn {
        width: 26px;
        height: 26px;
        font-size: 11px;
        top: 8px;
        right: 8px;
      }

      .examples-grid {
        grid-template-columns: 1fr;
      }

      .example-box {
        height: 160px;
      }

      .container {
        padding: 10px;
      }

      .card {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

<!-- 🔐 ICON BUTTON -->
<button id="adminBtn" onclick="openLogin()">🔐</button>

<header>
  <img src="logo.png">
  <div>
    <div class="title">Sps</div>
    <div class="subtitle">Electrical • Est 1989</div>
  </div>
</header>

<div class="container">

  <div class="card">
    <h2>Get a Quote</h2>
    <input id="qname" placeholder="Name">
    <input id="qemail" placeholder="Email">
    <input id="qphone" placeholder="Phone">
    <input id="qaddress" placeholder="Full Address">
    <textarea id="qmsg" placeholder="Message"></textarea>
    <button onclick="sendQuote()">Send Quote</button>
  </div>

  <div class="card">
    <h2>Live Chat</h2>
    <input id="cname" placeholder="Name">
    <textarea id="cmsg" placeholder="Message"></textarea>
    <button onclick="sendChat()">Send Message</button>
  </div>

  <div class="card">
    <h2>Examples</h2>

    <div class="examples-grid">
      <div class="example-box">Image 1</div>
      <div class="example-box">Image 2</div>
      <div class="example-box">Image 3</div>
      <div class="example-box">Image 4</div>
    </div>

  </div>

</div>

<!-- ADMIN -->
<div id="adminPanel" class="container">
  <div class="card">
    <h2>Admin Panel</h2>
    <button onclick="loadData()">Refresh</button>
    <div id="output"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div id="loginInner">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>

function openLogin() {
  document.getElementById("loginBox").style.display = "flex";
}

function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (user === "paul" && pass === "admin") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadData();
  } else {
    alert("Wrong login");
  }
}

/* QUOTE */
async function sendQuote() {
  await fetch("/send-quote", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("qname").value,
      email: document.getElementById("qemail").value,
      phone: document.getElementById("qphone").value,
      address: document.getElementById("qaddress").value,
      message: document.getElementById("qmsg").value
    })
  });

  alert("Quote sent ✔");
}

/* CHAT */
async function sendChat() {
  await fetch("/send-message", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("cname").value,
      message: document.getElementById("cmsg").value
    })
  });

  alert("Message sent ✔");
}

/* ADMIN */
async function loadData() {
  const res = await fetch("/data");
  const data = await res.json();

  let html = "<h3>Chats</h3>";

  for (let user in data.chats) {
    html += `<h4>${user}</h4>`;
    data.chats[user].forEach(m => {
      html += `<div class="msg"><b>${m.sender}:</b> ${m.message}</div>`;
    });
  }

  html += "<h3>Quotes</h3>";

  data.quotes.forEach(q => {
    html += `
      <div class="msg">
        <b>${q.name}</b><br>
        ${q.email}<br>
        ${q.phone}<br>
        ${q.address}<br>
        ${q.message}
      </div>
    `;
  });

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
