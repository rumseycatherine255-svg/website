<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPS Electrical</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

header {
  background:#2563eb;
  padding:20px;
  text-align:center;
}

.hero {
  padding:50px 20px;
  text-align:center;
  background:#111827;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card {
  background:#1f2937;
  padding:20px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
  background:#0b1220;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#2563eb;
}

.status {
  margin-top:10px;
  text-align:center;
}

.floating {
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.floating a {
  padding:12px;
  border-radius:50px;
  color:white;
  text-decoration:none;
  text-align:center;
  font-size:14px;
}

.call {background:#f59e0b;}
.wa {background:#22c55e;}
</style>

</head>

<body>

<header>
<h1>SPS Electrical</h1>
<p>Local • Reliable • Professional</p>
</header>

<div class="hero">
<h2>Electrical Services You Can Trust</h2>
<p>Fast response & fair pricing</p>
</div>

<div class="container">

<h2>Services</h2>

<div class="grid">
<div class="card">House Rewiring</div>
<div class="card">Lighting Installations</div>
<div class="card">Fuse Board Upgrades</div>
<div class="card">Fault Finding</div>
</div>

<h2 style="margin-top:30px;">Request a Quote</h2>

<form id="quoteForm">
<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email" required>
<textarea name="message" placeholder="Job details..." required></textarea>
<button type="submit">Send Quote</button>
<div class="status" id="status"></div>
</form>

</div>

<!-- Floating buttons -->
<div class="floating">
<a class="call" href="tel:+440000000000">📞 Call</a>
<a class="wa" href="https://wa.me/440000000000">💬 WhatsApp</a>
</div>

<script>
const form = document.getElementById("quoteForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  status.textContent = "Sending...";

  const data = {
    name: form.name.value,
    email: form.email.value,
    message: form.message.value
  };

  try {
    const res = await fetch("/send-quote", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.success) {
      status.textContent = "✅ Sent successfully!";
      form.reset();
    } else {
      status.textContent = "❌ Failed: " + json.error;
    }

  } catch (err) {
    status.textContent = "❌ Server error";
  }
});
</script>

</body>
</html>
